<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AgentProbe{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        /* ---- Base ---- */
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
            background: #030712;
            color: #f3f4f6;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* ---- Layout ---- */
        .layout { display: flex; min-height: 100vh; }
        .sidebar {
            width: 240px;
            background: #030712;
            border-right: 1px solid rgba(255,255,255,0.06);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 40;
        }
        .main-content {
            margin-left: 240px;
            flex: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .topbar {
            height: 56px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            padding: 0 24px;
            background: rgba(3,7,18,0.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 30;
        }
        .page-content { padding: 24px; flex: 1; }

        /* ---- Sidebar ---- */
        .sidebar-logo {
            padding: 20px 20px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: #f9fafb;
        }
        .sidebar-logo svg { flex-shrink: 0; }
        .sidebar-nav { padding: 8px 12px; flex: 1; }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            color: #9ca3af;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.15s ease;
            margin-bottom: 2px;
        }
        .sidebar-nav a:hover { color: #e5e7eb; background: rgba(255,255,255,0.04); }
        .sidebar-nav a.active { color: #f9fafb; background: rgba(255,255,255,0.08); }
        .sidebar-nav a svg { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.7; }
        .sidebar-nav a.active svg { opacity: 1; }
        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid rgba(255,255,255,0.06);
            font-size: 12px;
            color: #6b7280;
        }

        /* ---- Cards ---- */
        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 20px;
        }
        .card-title {
            font-size: 13px;
            font-weight: 500;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }
        .card-value {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #f9fafb;
        }
        .card-sub { font-size: 13px; color: #6b7280; margin-top: 4px; }

        /* ---- Tables ---- */
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th {
            text-align: left;
            font-size: 12px;
            font-weight: 500;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .data-table td {
            padding: 12px;
            font-size: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            color: #d1d5db;
        }
        .data-table tr:hover td { background: rgba(255,255,255,0.02); }
        .data-table tr.clickable { cursor: pointer; }

        /* ---- Badges ---- */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-success { background: rgba(34,197,94,0.12); color: #4ade80; }
        .badge-error { background: rgba(239,68,68,0.12); color: #f87171; }
        .badge-warning { background: rgba(234,179,8,0.12); color: #facc15; }
        .badge-info { background: rgba(59,130,246,0.12); color: #60a5fa; }
        .badge-neutral { background: rgba(255,255,255,0.06); color: #9ca3af; }

        /* ---- Forms ---- */
        .input-field {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            color: #f3f4f6;
            outline: none;
            transition: border-color 0.15s;
        }
        .input-field:focus { border-color: rgba(99,102,241,0.5); }
        .input-field::placeholder { color: #6b7280; }
        select.input-field { appearance: none; cursor: pointer; padding-right: 32px; }

        /* ---- Alert boxes ---- */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .alert-error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); color: #fca5a5; }
        .alert-warning { background: rgba(234,179,8,0.08); border: 1px solid rgba(234,179,8,0.2); color: #fde047; }
        .alert-info { background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.2); color: #93c5fd; }

        /* ---- Timeline ---- */
        .timeline-bar {
            height: 32px;
            border-radius: 6px;
            display: flex;
            overflow: hidden;
            gap: 2px;
            background: rgba(255,255,255,0.03);
        }
        .timeline-segment {
            height: 100%;
            border-radius: 4px;
            position: relative;
            cursor: pointer;
            transition: opacity 0.15s;
            min-width: 4px;
        }
        .timeline-segment:hover { opacity: 0.8; }
        .timeline-segment.llm_call { background: #6366f1; }
        .timeline-segment.tool_call { background: #22c55e; }
        .timeline-segment.tool_result { background: #14b8a6; }
        .timeline-segment.decision { background: #f59e0b; }
        .timeline-segment.handoff { background: #ec4899; }
        .timeline-segment.memory_read { background: #8b5cf6; }
        .timeline-segment.memory_write { background: #a855f7; }

        /* ---- Step cards ---- */
        .step-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .step-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            user-select: none;
        }
        .step-header:hover { background: rgba(255,255,255,0.02); }
        .step-body {
            padding: 0 16px 16px;
            border-top: 1px solid rgba(255,255,255,0.04);
        }
        .step-number {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }

        /* ---- Code blocks ---- */
        .code-block {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
            padding: 12px 16px;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: 13px;
            line-height: 1.6;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
            color: #d1d5db;
        }

        /* ---- SVG Charts ---- */
        .chart-container { padding: 8px 0; }

        /* ---- Responsive ---- */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; }
        }

        /* ---- Scrollbar ---- */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

        /* ---- Empty state ---- */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }
        .empty-state svg { margin: 0 auto 16px; opacity: 0.3; }
        .empty-state h3 { color: #9ca3af; font-size: 16px; margin-bottom: 8px; }
        .empty-state p { font-size: 14px; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="24" height="24" rx="6" fill="#6366f1"/>
                    <path d="M7 8h10M7 12h6M7 16h8" stroke="white" stroke-width="2" stroke-linecap="round"/>
                </svg>
                AgentProbe
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard" class="{% if page == 'dashboard' %}active{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <rect x="3" y="3" width="7" height="7" rx="1"/>
                        <rect x="14" y="3" width="7" height="7" rx="1"/>
                        <rect x="3" y="14" width="7" height="7" rx="1"/>
                        <rect x="14" y="14" width="7" height="7" rx="1"/>
                    </svg>
                    Overview
                </a>
                <a href="/recordings" class="{% if page == 'recordings' %}active{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <circle cx="12" cy="12" r="9"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                    Recordings
                </a>
                <a href="/tests" class="{% if page == 'tests' %}active{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M9 11l3 3L22 4"/>
                        <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
                    </svg>
                    Tests
                </a>
                <a href="/costs" class="{% if page == 'costs' %}active{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <line x1="12" y1="1" x2="12" y2="23"/>
                        <path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
                    </svg>
                    Costs
                </a>
            </nav>
            <div class="sidebar-footer">
                AgentProbe v0.1.0
            </div>
        </aside>

        <!-- Main -->
        <div class="main-content">
            <header class="topbar">
                <div style="display:flex;align-items:center;gap:12px;flex:1">
                    <h1 style="font-size:15px;font-weight:600;color:#f9fafb;letter-spacing:-0.01em">
                        {% block page_title %}Dashboard{% endblock %}
                    </h1>
                </div>
                <div style="display:flex;align-items:center;gap:12px">
                    <span style="font-size:12px;color:#6b7280">localhost:9847</span>
                </div>
            </header>
            <main class="page-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script>
        // Toggle step details
        function toggleStep(el) {
            const body = el.nextElementSibling;
            const arrow = el.querySelector('.step-arrow');
            if (body.style.display === 'none' || !body.style.display) {
                body.style.display = 'block';
                if (arrow) arrow.style.transform = 'rotate(90deg)';
            } else {
                body.style.display = 'none';
                if (arrow) arrow.style.transform = 'rotate(0deg)';
            }
        }
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
